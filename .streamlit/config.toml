# Dark theme, matching the plotly_dark template the charts use. Without this,
# Streamlit renders light while the figures render dark and the two fight.
[theme]
base = "dark"
primaryColor = "#5aa9e6"
backgroundColor = "#0b0e14"
secondaryBackgroundColor = "#141922"
textColor = "#e6e9ef"

[browser]
gatherUsageStats = false

[server]
# Streamlit's default is 200 MB, and it buffers the whole upload into memory
# BEFORE any application code runs — so our own check in src/upload/validate.py
# could never have stopped a 200 MB file from being read in. This closes that at
# the framework level.
#
# 10 MB, and MAX_COUNTS_BYTES in src/upload/validate.py is also 10 MB. These two
# numbers MUST stay equal: when they drifted apart the widget accepted a file the
# validator then rejected, and the user was told a limit that was not the one
# they had just hit. One number, stated once, in both places.
maxUploadSize = 10
