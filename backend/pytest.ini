[pytest]
markers =
    live: hits the real Anthropic API; needs a key and costs money

# Live tests are opt-in. Without this, every `pytest tests/` run spends real money
# on the Anthropic API and inherits the agent's non-determinism — so an unrelated
# change (a new reliability tier, say) looks like it broke the suite. Run them
# deliberately:
#
#     pytest tests/test_agent_behaviour.py -m live
addopts = -m "not live"
